<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>리콜 레이더 — 위해제품 즉시확인 · 개인화 리콜 알림</title>
<!--
  ============================================================================
  리콜 레이더 (Recall Radar) — 데모앱 v1 (단일 자체완결 HTML · 오프라인 구동)
  ============================================================================
  데이터 정직성 선언 (CLAUDE.md §2.6):
    본 데모의 리콜 레코드는 MOCK 데이터다.
    실제 서비스는 국가기술표준원(KATS, 산업통상자원부 소속) 공공데이터 API를
    연동한다:
      - 제품 안전인증·리콜 정보 (data.go.kr 데이터셋 15116894, OpenAPI)
      - 제품안전 국외리콜정보 (data.go.kr 데이터셋 15040707, 파일)
      - 어린이제품 KC인증 품목 (data.go.kr 데이터셋 15085894, OpenAPI)
    공모전 데모 단계에서는 API 키가 없으므로(§3.1 키 부재 mock fallback),
    위 API의 응답 구조(RECALL_SEQ, PRODUCT_NM, MODEL_NM, MAKER_NM,
    RECALL_RSN, RECALL_DT 등)를 모사한 mock 레코드 50건+를 코드에 내장했다.
    실 연동 시 fetchRecalls() 함수 한 곳만 교체하면 된다(주석 표기됨).
  ============================================================================
-->
<style>
:root{
  --hue: 211;
  --brand: hsl(211 92% 52%);
  --brand-d: hsl(211 92% 44%);
  --brand-soft: hsl(211 92% 96%);
  --ink: hsl(214 30% 16%);
  --ink-2: hsl(214 14% 42%);
  --ink-3: hsl(214 12% 60%);
  --bg: hsl(210 36% 97%);
  --surface: #ffffff;
  --surface-2: hsl(210 30% 98.5%);
  --line: hsl(214 20% 90%);
  --line-2: hsl(214 22% 84%);
  --danger: hsl(2 78% 53%);
  --danger-soft: hsl(2 80% 96%);
  --warn: hsl(36 96% 48%);
  --warn-soft: hsl(40 96% 95%);
  --safe: hsl(150 62% 40%);
  --safe-soft: hsl(150 56% 95%);
  --info: hsl(211 92% 52%);
  --shadow: 0 1px 2px hsl(214 30% 16% / .05), 0 8px 24px hsl(214 30% 16% / .06);
  --shadow-lg: 0 12px 40px hsl(214 30% 16% / .16);
  --radius: 16px;
  --radius-s: 12px;
  --tab-h: 64px;
  --side-w: 248px;
  --maxw: 1180px;
  --font: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "맑은 고딕", "Malgun Gothic", sans-serif;
}
[data-theme="dark"]{
  --brand: hsl(211 96% 64%);
  --brand-d: hsl(211 96% 70%);
  --brand-soft: hsl(211 50% 18%);
  --ink: hsl(210 30% 94%);
  --ink-2: hsl(212 16% 70%);
  --ink-3: hsl(212 14% 54%);
  --bg: hsl(216 28% 10%);
  --surface: hsl(216 24% 14%);
  --surface-2: hsl(216 22% 17%);
  --line: hsl(216 18% 24%);
  --line-2: hsl(216 16% 30%);
  --danger: hsl(2 84% 64%);
  --danger-soft: hsl(2 50% 22%);
  --warn: hsl(38 92% 60%);
  --warn-soft: hsl(38 40% 22%);
  --safe: hsl(150 60% 54%);
  --safe-soft: hsl(150 36% 20%);
  --shadow: 0 1px 2px hsl(0 0% 0% / .3), 0 8px 24px hsl(0 0% 0% / .35);
  --shadow-lg: 0 16px 48px hsl(0 0% 0% / .55);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--brand);text-decoration:none}
::selection{background:var(--brand);color:#fff}
.hidden{display:none !important}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

/* ===== App shell ===== */
.app{display:flex;min-height:100vh;min-height:100dvh}
/* Sidebar (desktop) */
.sidebar{
  width:var(--side-w);flex:0 0 var(--side-w);
  background:var(--surface);border-right:1px solid var(--line);
  position:sticky;top:0;height:100vh;height:100dvh;
  display:flex;flex-direction:column;padding:18px 14px;gap:4px;z-index:30;
}
.brand{display:flex;align-items:center;gap:10px;padding:8px 10px 16px}
.brand .logo{
  width:38px;height:38px;border-radius:11px;flex:0 0 38px;
  background:linear-gradient(135deg,var(--brand),var(--brand-d));
  display:grid;place-items:center;color:#fff;position:relative;overflow:hidden;
}
.brand .logo svg{width:22px;height:22px}
.brand b{font-size:17px;font-weight:800;letter-spacing:-.02em;display:block}
.brand span{font-size:11px;color:var(--ink-3);font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;
  color:var(--ink-2);font-weight:600;font-size:14.5px;width:100%;text-align:left;
  transition:background .15s,color .15s;position:relative;
}
.nav-item svg{width:21px;height:21px;flex:0 0 21px}
.nav-item:hover{background:var(--surface-2)}
.nav-item.active{background:var(--brand-soft);color:var(--brand-d)}
.nav-item .badge{margin-left:auto;background:var(--danger);color:#fff;font-size:11px;font-weight:800;min-width:19px;height:19px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
.side-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-3);line-height:1.45}
.side-foot .data-pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:4px 8px;margin-bottom:6px;font-weight:700;color:var(--ink-2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--safe);box-shadow:0 0 0 0 var(--safe);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 hsl(150 62% 40% / .5)}70%{box-shadow:0 0 0 7px hsl(150 62% 40% / 0)}100%{box-shadow:0 0 0 0 hsl(150 62% 40% / 0)}}

/* Main */
.main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:20;
  background:hsl(210 36% 97% / .82);backdrop-filter:saturate(180%) blur(16px);
  -webkit-backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:12px;padding:12px 22px;
}
[data-theme="dark"] .topbar{background:hsl(216 28% 10% / .82)}
.topbar h1{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:0}
.topbar .sub{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:1px}
.topbar .spacer{flex:1}
.icon-btn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--ink-2);border:1px solid var(--line);background:var(--surface);transition:transform .12s,background .15s}
.icon-btn:active{transform:scale(.94)}
.icon-btn:hover{background:var(--surface-2)}
.icon-btn svg{width:20px;height:20px}
.icon-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;min-width:17px;height:17px;border-radius:9px;display:grid;place-items:center;padding:0 4px}
.icon-btn.rel{position:relative}
.menu-btn{display:none}

.content{padding:22px;max-width:var(--maxw);width:100%;margin:0 auto;flex:1}
.view{animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== Cards / generic ===== */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-p{padding:18px}
.grid{display:grid;gap:14px}
.section-head{display:flex;align-items:center;gap:10px;margin:6px 2px 12px}
.section-head h2{font-size:17px;font-weight:800;letter-spacing:-.02em;margin:0}
.section-head .more{margin-left:auto;font-size:13px;font-weight:700;color:var(--brand)}
.muted{color:var(--ink-3)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);transition:all .14s;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:46px;padding:0 18px;border-radius:var(--radius-s);font-weight:700;font-size:15px;background:var(--brand);color:#fff;transition:transform .12s,filter .15s;border:1px solid transparent}
.btn:active{transform:scale(.97)}
.btn:hover{filter:brightness(1.04)}
.btn svg{width:19px;height:19px}
.btn.ghost{background:var(--surface);color:var(--ink);border-color:var(--line-2)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.danger{background:var(--danger)}
.btn.sm{height:38px;padding:0 13px;font-size:13.5px;border-radius:10px}
.btn.full{width:100%}
.btn:disabled{opacity:.4;pointer-events:none}

/* Risk badges */
.badge-risk{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;letter-spacing:-.01em;white-space:nowrap}
.badge-risk svg{width:13px;height:13px}
.r-high{background:var(--danger-soft);color:var(--danger)}
.r-mid{background:var(--warn-soft);color:hsl(33 90% 38%)}
[data-theme="dark"] .r-mid{color:var(--warn)}
.r-low{background:var(--safe-soft);color:var(--safe)}
.r-info{background:var(--brand-soft);color:var(--brand-d)}
.tag{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11.5px;font-weight:700;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2)}
.tag.intl{background:hsl(270 60% 96%);color:hsl(270 50% 45%);border-color:hsl(270 50% 90%)}
[data-theme="dark"] .tag.intl{background:hsl(270 30% 24%);color:hsl(270 60% 78%);border-color:hsl(270 30% 34%)}
.tag.dom{background:hsl(211 80% 96%);color:var(--brand-d);border-color:hsl(211 70% 90%)}
[data-theme="dark"] .tag.dom{background:hsl(211 40% 24%);color:var(--brand-d);border-color:hsl(211 30% 34%)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{padding:16px 16px 15px;cursor:pointer;transition:transform .14s, box-shadow .18s}
.kpi:active{transform:scale(.98)}
.kpi .k-top{display:flex;align-items:center;gap:8px;color:var(--ink-3);font-size:12.5px;font-weight:700}
.kpi .k-top .dot{width:9px;height:9px;border-radius:3px}
.kpi .k-num{font-size:30px;font-weight:800;letter-spacing:-.03em;margin:8px 0 2px;font-variant-numeric:tabular-nums}
.kpi .k-sub{font-size:12px;color:var(--ink-3);font-weight:600}
.kpi .k-sub b{color:var(--safe);font-weight:800}
.kpi .k-sub b.up{color:var(--danger)}

/* Recall list item */
.recall{display:flex;gap:13px;padding:15px;align-items:flex-start;border-bottom:1px solid var(--line);cursor:pointer;transition:background .14s}
.recall:last-child{border-bottom:none}
.recall:hover{background:var(--surface-2)}
.recall:active{background:var(--surface-2)}
.r-thumb{width:50px;height:50px;flex:0 0 50px;border-radius:12px;display:grid;place-items:center;font-size:24px;background:var(--surface-2);border:1px solid var(--line)}
.r-body{flex:1;min-width:0}
.r-body .r-cat{font-size:11.5px;font-weight:700;color:var(--ink-3);margin-bottom:2px}
.r-body .r-name{font-size:15px;font-weight:700;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-body .r-meta{font-size:12.5px;color:var(--ink-2);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.r-body .r-rsn{font-size:12.5px;color:var(--ink-2);margin-top:5px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.r-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:0 0 auto}
.star{color:var(--ink-3);transition:transform .12s,color .14s}
.star:active{transform:scale(1.3)}
.star.on{color:var(--warn)}
.star svg{width:20px;height:20px}

/* Toolbar */
.toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search{flex:1;min-width:160px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line-2);border-radius:12px;padding:0 14px;height:46px}
.search svg{width:19px;height:19px;color:var(--ink-3);flex:0 0 19px}
.search input{border:none;background:none;outline:none;flex:1;color:var(--ink);min-width:0}
.select{height:46px;border:1px solid var(--line-2);background:var(--surface);border-radius:12px;padding:0 12px;color:var(--ink);font-weight:600;cursor:pointer;max-width:100%}

/* Modal / sheet */
.scrim{position:fixed;inset:0;background:hsl(214 30% 16% / .42);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:60;display:flex;align-items:flex-end;justify-content:center;animation:fade .2s;padding:0}
.scrim.center{align-items:center;padding:18px}
.sheet{background:var(--surface);width:100%;max-width:560px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .3s cubic-bezier(.2,.8,.2,1)}
.scrim.center .sheet{border-radius:22px;max-height:88vh;animation:popIn .25s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:none;opacity:1}}
.sheet-grip{width:40px;height:5px;border-radius:3px;background:var(--line-2);margin:10px auto 2px}
.sheet-head{display:flex;align-items:center;gap:10px;padding:12px 20px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:2}
.sheet-head h3{font-size:18px;font-weight:800;margin:0;flex:1;letter-spacing:-.02em}
.sheet-body{padding:18px 20px 26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;height:46px;border:1px solid var(--line-2);border-radius:11px;padding:0 13px;background:var(--surface-2);color:var(--ink);outline:none;transition:border .15s}
.field textarea{height:auto;padding:11px 13px;resize:vertical;min-height:64px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}

/* Scan */
.scanner{position:relative;border-radius:20px;overflow:hidden;background:#0c1420;aspect-ratio:1/1;max-width:380px;margin:0 auto;display:grid;place-items:center}
.scanner video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.scan-frame{position:relative;width:64%;aspect-ratio:1.4/1;z-index:2}
.scan-frame i{position:absolute;width:30px;height:30px;border:3px solid #fff;opacity:.92}
.scan-frame i:nth-child(1){top:0;left:0;border-right:none;border-bottom:none;border-radius:8px 0 0 0}
.scan-frame i:nth-child(2){top:0;right:0;border-left:none;border-bottom:none;border-radius:0 8px 0 0}
.scan-frame i:nth-child(3){bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 8px}
.scan-frame i:nth-child(4){bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 8px 0}
.scan-laser{position:absolute;left:6%;right:6%;height:2.5px;background:linear-gradient(90deg,transparent,hsl(150 80% 60%),transparent);box-shadow:0 0 12px hsl(150 80% 60%);top:50%;z-index:3;animation:scanmove 2.4s ease-in-out infinite}
@keyframes scanmove{0%,100%{top:18%}50%{top:82%}}
.scan-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:#fff;font-size:13px;font-weight:600;z-index:4;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.scan-cam-off{color:#9fb0c4;text-align:center;z-index:2;padding:20px}
.scan-cam-off svg{width:44px;height:44px;margin-bottom:10px;opacity:.7}

/* Result card */
.result{text-align:center;padding:8px 4px 4px}
.result .ring{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;margin:0 auto 14px;position:relative}
.result .ring svg{width:48px;height:48px}
.result.high .ring{background:var(--danger-soft);color:var(--danger)}
.result.mid .ring{background:var(--warn-soft);color:var(--warn)}
.result.low .ring{background:var(--safe-soft);color:var(--safe)}
.result h2{font-size:24px;font-weight:800;margin:4px 0 4px;letter-spacing:-.02em}
.result .verdict-sub{color:var(--ink-2);font-size:14px;margin-bottom:6px}

.kv{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink-3);font-weight:600;flex:0 0 auto}
.kv .v{color:var(--ink);font-weight:700;text-align:right}

/* Bars / charts */
.bar-row{display:flex;align-items:center;gap:11px;padding:7px 0}
.bar-row .lbl{flex:0 0 92px;font-size:13px;font-weight:600;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:11px;border-radius:6px;background:var(--surface-2);overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--brand),var(--brand-d));transition:width .8s cubic-bezier(.2,.8,.2,1)}
.bar-row .val{flex:0 0 auto;font-size:12.5px;font-weight:800;color:var(--ink-2);font-variant-numeric:tabular-nums}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12.5px;color:var(--ink-2);font-weight:600}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}

/* Empty state */
.empty{text-align:center;padding:42px 20px;color:var(--ink-3)}
.empty svg{width:50px;height:50px;opacity:.5;margin-bottom:12px}
.empty b{display:block;color:var(--ink-2);font-size:15px;margin-bottom:4px}

/* Toast */
#toast{position:fixed;left:50%;bottom:calc(var(--tab-h) + 18px);transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:12px 18px;border-radius:13px;font-weight:700;font-size:14px;z-index:90;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.2,.8,.2,1);max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
[data-theme="dark"] #toast{background:var(--surface-2);color:var(--ink);border:1px solid var(--line-2)}

/* Notification item */
.noti{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;position:relative;transition:background .14s}
.noti:hover{background:var(--surface-2)}
.noti.unread{background:var(--brand-soft)}
.noti.unread::before{content:"";position:absolute;left:6px;top:50%;width:7px;height:7px;border-radius:50%;background:var(--brand);transform:translateY(-50%)}
.noti .n-ic{width:40px;height:40px;flex:0 0 40px;border-radius:11px;display:grid;place-items:center}
.noti .n-body{flex:1;min-width:0}
.noti .n-title{font-weight:700;font-size:14px;margin-bottom:2px}
.noti .n-desc{font-size:12.5px;color:var(--ink-2);line-height:1.4}
.noti .n-time{font-size:11px;color:var(--ink-3);margin-top:3px}

/* Stepper */
.steps{display:flex;gap:6px;margin-bottom:16px}
.steps .s{flex:1;height:5px;border-radius:3px;background:var(--line)}
.steps .s.done{background:var(--brand)}

/* Pill toggle */
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.seg button{padding:7px 14px;border-radius:8px;font-weight:700;font-size:13px;color:var(--ink-2)}
.seg button.on{background:var(--surface);color:var(--brand-d);box-shadow:var(--shadow)}

/* Stat tiles */
.stat-tiles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.stat-tiles .t{padding:13px;border-radius:13px;background:var(--surface-2);border:1px solid var(--line);text-align:center}
.stat-tiles .t .n{font-size:22px;font-weight:800;letter-spacing:-.02em}
.stat-tiles .t .l{font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:2px}

/* donut */
.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center}
.donut{flex:0 0 auto}

/* ===== Bottom tabbar (mobile) ===== */
.tabbar{display:none}

/* ===== Responsive ===== */
@media (max-width: 860px){
  .sidebar{display:none}
  .menu-btn{display:grid}
  .content{padding:16px 14px calc(var(--tab-h) + 22px)}
  .topbar{padding:11px 14px}
  .topbar h1{font-size:17px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:11px}
  .kpi .k-num{font-size:26px}
  .stat-tiles{gap:8px}
  .stat-tiles .t .n{font-size:19px}
  .tabbar{
    display:flex;position:fixed;left:0;right:0;bottom:0;height:calc(var(--tab-h) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);
    background:hsl(210 36% 97% / .92);backdrop-filter:saturate(180%) blur(18px);
    -webkit-backdrop-filter:saturate(180%) blur(18px);
    border-top:1px solid var(--line);z-index:50;align-items:stretch;
  }
  [data-theme="dark"] .tabbar{background:hsl(216 28% 10% / .92)}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-3);font-size:10.5px;font-weight:700;position:relative}
  .tab svg{width:23px;height:23px}
  .tab.active{color:var(--brand)}
  .tab .badge{position:absolute;top:7px;left:calc(50% + 8px);background:var(--danger);color:#fff;font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
  .tab.scan-tab{transform:translateY(-10px)}
  .tab.scan-tab .fab{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;display:grid;place-items:center;box-shadow:0 8px 20px hsl(211 92% 52% / .4)}
  .tab.scan-tab .fab svg{width:26px;height:26px}
  .tab.scan-tab span{margin-top:-3px}
}
@media (max-width:480px){
  .kpi-grid{gap:9px}
  .toolbar{gap:7px}
  .search{height:44px}
  .select{height:44px;font-size:13.5px}
}
@media (min-width:861px){
  .mobile-only{display:none !important}
}
/* Drawer (mobile nav overflow) */
.drawer-scrim{position:fixed;inset:0;background:hsl(214 30% 16% / .42);z-index:70;animation:fade .2s}
.drawer{position:fixed;top:0;left:0;bottom:0;width:270px;max-width:82vw;background:var(--surface);z-index:71;padding:18px 14px;display:flex;flex-direction:column;gap:4px;animation:slideLeft .26s cubic-bezier(.2,.8,.2,1);box-shadow:var(--shadow-lg)}
@keyframes slideLeft{from{transform:translateX(-100%)}to{transform:none}}

function seedIfFirst(){

/* ---------------------------------------------------------------------------
   3. 도메인 로직 — 매칭 / 위해등급 / 통계
   --------------------------------------------------------------------------- */
function recallBySeq(seq){ return RECALLS.find(r=>r.seq===seq) || null; }
function daysAgo(dt){
  const a = new Date(todayStr), b = new Date(dt);
  return Math.round((a-b)/86400000);
}
function relTime(dt){
  const d = daysAgo(dt);
  if(d<=0) return "오늘";
  if(d===1) return "어제";
  if(d<7) return d+"일 전";
  if(d<30) return Math.floor(d/7)+"주 전";
  return Math.floor(d/30)+"개월 전";
}
function gradeLabel(g){ return g>=3?"위험":g===2?"주의":"경미"; }
function gradeClass(g){ return g>=3?"r-high":g===2?"r-mid":"r-low"; }

// 구매이력 ↔ 리콜 매칭(모델·제품명 유사) → 알림 생성
function matchProductToRecall(p){
  // 정확 모델 매칭 우선
  let m = RECALLS.find(r=> r.model && p.model && r.model.toUpperCase()===p.model.toUpperCase() && sameOrClose(r.name,p.name));
  if(m) return m;
  // 제품명 완전일치
  m = RECALLS.find(r=> r.name===p.name && r.maker===p.maker);
  return m||null;
}
function sameOrClose(a,b){
  if(!a||!b) return false;
  a=a.replace(/\s/g,""); b=b.replace(/\s/g,"");
  return a===b || a.includes(b) || b.includes(a);
}
function recomputeMatches(silent){
  let newCount=0;
  S.myProducts.forEach(p=>{
    const m = matchProductToRecall(p);
    p.recallSeq = m? m.seq : null;
    if(m){
      const exists = S.notifications.some(n=>n.seq===m.seq && n.kind==="match" && n.pid===p.id);
      if(!exists){
        S.notifications.unshift({
          id:uid(), seq:m.seq, pid:p.id, kind:"match",
          title:`내 제품 리콜 경보 — ${p.name}`,
          desc:`${m.rsn} · ${m.recallType} · 등급 ${gradeLabel(m.grade)}`,
          time:Date.now()-newCount*60000, read:false
        });
        newCount++;
      }
    }
  });
  // 구독 카테고리 신규 리콜 알림(데모: 최근 3건)
  S.subscriptions.forEach(c=>{
    const recents = RECALLS.filter(r=>r.cat===c).sort((a,b)=>b.dt.localeCompare(a.dt)).slice(0,2);
    recents.forEach(r=>{
      const exists = S.notifications.some(n=>n.seq===r.seq && n.kind==="sub");
      if(!exists){
        S.notifications.push({
          id:uid(), seq:r.seq, kind:"sub",
          title:`구독 카테고리 신규 리콜 — ${CATS[c].name}`,
          desc:`${r.name} · ${r.rsn}`, time:Date.now()-3600000-newCount*120000, read:false
        });
      }
    });
  });
  if(!silent) save();
  return newCount;
}
function unreadCount(){ return S.notifications.filter(n=>!n.read).length; }
function myMatchedCount(){ return S.myProducts.filter(p=>p.recallSeq).length; }

// 통계 집계
function stats(){
  const total = RECALLS.length;
  const dom = RECALLS.filter(r=>r.origin==="dom").length;
  const intl = total-dom;
  const high = RECALLS.filter(r=>r.grade>=3).length;
  const recent7 = RECALLS.filter(r=>daysAgo(r.dt)<=7).length;
  const byCat = {};
  Object.keys(CATS).forEach(c=> byCat[c]=RECALLS.filter(r=>r.cat===c).length);
  const byGrade = {3:high, 2:RECALLS.filter(r=>r.grade===2).length, 1:RECALLS.filter(r=>r.grade===1).length};
  // 월별
  const byMonth = {};
  RECALLS.forEach(r=>{ const m=r.dt.slice(0,7); byMonth[m]=(byMonth[m]||0)+1; });
  // 위해유형
  const byHazard = {};
  RECALLS.forEach(r=>{ byHazard[r.rsn]=(byHazard[r.rsn]||0)+1; });
  return {total,dom,intl,high,recent7,byCat,byGrade,byMonth,byHazard};
}

function startCamera(){
  const scanner=document.getElementById("scanner");
  const off=document.getElementById("camOff");
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    toast("카메라를 지원하지 않아 수동 입력으로 전환합니다");
    return openManualScan();
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
    camStream=stream;
    if(off) off.remove();
    scanner.innerHTML = `<video autoplay playsinline muted></video>
      <div class="scan-frame"><i></i><i></i><i></i><i></i></div>
      <div class="scan-laser"></div>
      <div class="scan-hint">바코드를 사각형 안에 맞춰주세요 · 자동 인식 중…</div>`;
    scanner.querySelector("video").srcObject=stream;
    // 데모: 실 디코더(ZXing) 자리. 3초 후 샘플 판정으로 시연.
    setTimeout(()=>{ stopCamera(); const pool=RECALLS.filter(r=>r.grade>=2); doScan(pool[Math.floor(Math.random()*pool.length)]); }, 3200);
  }).catch(err=>{
    toast("카메라 권한이 없어 수동 입력으로 전환합니다");
    openManualScan();
  });
}

/* ===== FEED ===== */
function feedResults(){
  const f=S.feedFilters, q=S.feedQuery.trim().toLowerCase();
  let list = RECALLS.filter(r=>{
    if(f.cat!=="all" && r.cat!==f.cat) return false;
    if(f.grade!=="all" && r.grade!==+f.grade) return false;
    if(f.origin!=="all" && r.origin!==f.origin) return false;
    if(f.type!=="all" && r.recallType!==f.type) return false;
    if(q){
      const hay=(r.name+r.model+r.maker+r.rsn+r.country).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  if(S.feedSort==="date") list.sort((a,b)=>b.dt.localeCompare(a.dt));
  else if(S.feedSort==="grade") list.sort((a,b)=> b.grade-a.grade || b.dt.localeCompare(a.dt));
  else if(S.feedSort==="name") list.sort((a,b)=> a.name.localeCompare(b.name,"ko"));
  return list;
}

function shareRecall(r){
  const txt = `[리콜 레이더] ${gradeLabel(r.grade)} 리콜 알림\n제품: ${r.name} (${r.model})\n제조사: ${r.maker}\n사유: ${r.rsn}\n조치: ${r.action}\n출처: KATS 제품안전정보 (${r.dt})`;
  if(navigator.share){
    navigator.share({title:"리콜 레이더", text:txt}).catch(()=>copyText(txt));
  } else copyText(txt);
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("공유 텍스트를 복사했어요")).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("공유 텍스트를 복사했어요"); }catch(e){ toast("복사에 실패했어요"); }
  document.body.removeChild(ta);
}
function exportCSV(list){
  if(!list.length){ toast("내보낼 데이터가 없습니다"); return; }
  const head=["일련번호","제품명","모델","제조사","카테고리","위해사유","위해등급","리콜유형","국내외","원산지","리콜일자","KC번호","조치"];
  const rows=list.map(r=>[r.seq,r.name,r.model,r.maker,CATS[r.cat].name,r.rsn,gradeLabel(r.grade),r.recallType,r.origin==="dom"?"국내":"국외",r.country,r.dt,r.kc||"미인증",r.action]);
  const csv="﻿"+[head,...rows].map(row=>row.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`리콜레이더_${list.length}건_${todayStr}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast(`${list.length}건을 CSV로 내보냈어요`);
}

  const np = Object.assign({id:uid(), recallSeq:null}, p);
  S.myProducts.unshift(np);

  const m = matchProductToRecall(np);
  save();
  if(m) toast(`등록 완료 — ⚠ 리콜 대상 제품입니다`);

}

function kcPrecheck(q, catSel){
  const ql=q.toLowerCase();
  // 룰 매칭
  let rule=null;
  for(const r of KC_RULES){ if(r.kw.some(k=>ql.includes(k.toLowerCase()))){ rule=r; break; } }
  // 국외리콜 교차검색
  const intlHits = RECALLS.filter(r=>r.origin==="intl").filter(r=>{
    const hay=(r.name+r.model+r.rsn).toLowerCase();
    return q.split(/\s+/).some(w=>w.length>2 && hay.includes(w.toLowerCase()));
  }).slice(0,3);
  let risk = rule? rule.risk : 1;
  if(intlHits.length) risk = Math.max(risk, intlHits.reduce((m,r)=>Math.max(m,r.grade),0));
  if(catSel){ const cr=KC_RULES.find(r=>r.cat===catSel); if(cr) risk=Math.max(risk,cr.risk); }
  const kcRequired = rule? true : (catSel==="baby"||catSel==="toy"||catSel==="elec"||catSel==="auto");
  return {risk, rule, intlHits, kcRequired, cat: rule?rule.cat:catSel};
}

function cssVar(name){ return getComputedStyle(document.body).getPropertyValue(name).trim(); }
function drawDonut(){
  const cv=document.getElementById("donut"); if(!cv) return;
  const ctx=cv.getContext("2d"); const W=cv.width, cx=W/2, cy=W/2, r=W/2-14, ir=r*0.58;
  ctx.clearRect(0,0,W,W);
  const st=stats();
  const segs=[{v:st.byGrade[3],c:cssVar("--danger")},{v:st.byGrade[2],c:cssVar("--warn")},{v:st.byGrade[1],c:cssVar("--safe")}];
  const tot=segs.reduce((s,x)=>s+x.v,0)||1;
  let a=-Math.PI/2;
  segs.forEach(s=>{
    const ang=s.v/tot*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a,a+ang); ctx.closePath();
    ctx.fillStyle=s.c; ctx.fill(); a+=ang;
  });
  ctx.globalCompositeOperation="destination-out";
  ctx.beginPath(); ctx.arc(cx,cy,ir,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation="source-over";
  ctx.fillStyle=cssVar("--ink"); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font="800 44px -apple-system,sans-serif"; ctx.fillText(st.total, cx, cy-8);
  ctx.font="600 22px -apple-system,sans-serif"; ctx.fillStyle=cssVar("--ink-3"); ctx.fillText("건 리콜", cx, cy+26);
}
function drawLine(){
  const cv=document.getElementById("lineChart"); if(!cv) return;
  const ctx=cv.getContext("2d"); const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const st=stats();
  const months=Object.entries(st.byMonth).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!months.length) return;
  const pad={l:34,r:14,t:18,b:30};
  const max=Math.max(...months.map(m=>m[1]),1);
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  // grid
  ctx.strokeStyle=cssVar("--line"); ctx.lineWidth=1; ctx.fillStyle=cssVar("--ink-3"); ctx.font="500 16px -apple-system,sans-serif";
  for(let i=0;i<=4;i++){ const y=pad.t+ih*i/4; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.textAlign="right"; ctx.textBaseline="middle"; ctx.fillText(Math.round(max*(4-i)/4), pad.l-6, y); }
  const xs=(i)=> pad.l + (months.length===1? iw/2 : iw*i/(months.length-1));
  const ys=(v)=> pad.t + ih*(1-v/max);
  const brand=cssVar("--brand");
  const brandA=(a)=> brand.replace(")", " / "+a+")"); // hsl(...) -> hsl(... / 0.3)
  // area
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,brandA(0.32)); grad.addColorStop(1,brandA(0));
  ctx.beginPath(); ctx.moveTo(xs(0),H-pad.b);
  months.forEach((m,i)=> ctx.lineTo(xs(i),ys(m[1])));
  ctx.lineTo(xs(months.length-1),H-pad.b); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  // line
  ctx.beginPath(); months.forEach((m,i)=>{ const x=xs(i),y=ys(m[1]); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.strokeStyle=cssVar("--brand"); ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.stroke();
  // points + labels
  months.forEach((m,i)=>{ const x=xs(i),y=ys(m[1]);
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fillStyle=cssVar("--brand"); ctx.fill();
    ctx.fillStyle=cssVar("--ink-3"); ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.font="500 15px -apple-system,sans-serif"; ctx.fillText(m[0].slice(5)+"월", x, H-pad.b+6);
  });
}
